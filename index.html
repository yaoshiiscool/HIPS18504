<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>HIPS 18504 — Weekly Vibe Coding Assignments</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: system-ui, -apple-system, sans-serif;
      background: #0f0f11;
      color: #e8e8ea;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 4rem 1.5rem;
    }

    header {
      text-align: center;
      margin-bottom: 3rem;
    }

    header h1 {
      font-size: clamp(1.8rem, 5vw, 3rem);
      font-weight: 700;
      letter-spacing: -0.02em;
      color: #ffffff;
    }

    header p {
      margin-top: 0.6rem;
      font-size: 1rem;
      color: #888;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
      gap: 1.25rem;
      width: 100%;
      max-width: 860px;
    }

    .card {
      background: #1a1a1f;
      border: 1px solid #2a2a31;
      border-radius: 12px;
      padding: 1.5rem 1.75rem;
      text-decoration: none;
      color: inherit;
      transition: border-color 0.2s, background 0.2s, transform 0.15s;
      display: flex;
      flex-direction: column;
      gap: 0.4rem;
    }

    .card:hover {
      border-color: #5b6af0;
      background: #1e1e27;
      transform: translateY(-2px);
    }

    .card .label {
      font-size: 0.7rem;
      font-weight: 600;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: #5b6af0;
    }

    .card .title {
      font-size: 1.1rem;
      font-weight: 600;
      color: #ffffff;
    }

    .card.empty {
      opacity: 0.45;
      cursor: default;
      pointer-events: none;
    }

    .card .status {
      font-size: 0.78rem;
      color: #666;
      margin-top: 0.25rem;
    }

    footer {
      margin-top: 4rem;
      font-size: 0.8rem;
      color: #444;
    }
  </style>
</head>
<body>
  <header>
    <h1>HIPS 18504</h1>
    <p>Weekly Vibe Coding Assignments</p>
  </header>

  <div class="grid">
    <a href="Week 2/index.html" class="card">
      <span class="label">Week 2</span>
      <span class="title">Ars Combinatoria</span>
      <span class="status">Kirnberger · Riepel · Galeazzi</span>
    </a>

    <a href="Week 3/index.html" class="card">
      <span class="label">Week 3</span>
      <span class="title">De Prony's Bureau Simulator</span>
      <span class="status">Simulation game: workers · checking · pressure</span>
    </a>
  </div>

  <footer>HIPS 18504 &mdash; Spring 2026</footer>
</body>
</html>
